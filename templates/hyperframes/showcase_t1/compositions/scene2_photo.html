<template id="haus-photo-template">
  <div data-composition-id="haus-photo" data-width="1080" data-height="1920">
    <div class="photo-frame" id="haus-photo-frame" data-layout-allow-overflow>
      <div class="photo-corner tl"></div>
      <div class="photo-corner tr"></div>
      <div class="photo-corner bl"></div>
      <div class="photo-corner br"></div>
      <img id="haus-photo-img" src="assets/produto.jpg" alt="" />
    </div>
    <div class="photo-caption" id="haus-photo-caption">{{COLLECTION_LABEL}}</div>

    <style>
      [data-composition-id="haus-photo"] {
        position: absolute; inset: 0;
        background: #F7F4EE;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 60px;
      }
      [data-composition-id="haus-photo"] .photo-frame {
        position: relative;
        width: 940px;
        height: 940px;
        overflow: hidden;
        background: #FFFFFF;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      [data-composition-id="haus-photo"] .photo-frame img {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
        display: block;
        transform-origin: center center;
      }
      [data-composition-id="haus-photo"] .photo-corner {
        position: absolute;
        width: 40px;
        height: 40px;
        border-color: #9C8A5C;
        border-style: solid;
        border-width: 0;
        z-index: 2;
      }
      [data-composition-id="haus-photo"] .photo-corner.tl { top: -10px; left: -10px; border-top-width: 1px; border-left-width: 1px; }
      [data-composition-id="haus-photo"] .photo-corner.tr { top: -10px; right: -10px; border-top-width: 1px; border-right-width: 1px; }
      [data-composition-id="haus-photo"] .photo-corner.bl { bottom: -10px; left: -10px; border-bottom-width: 1px; border-left-width: 1px; }
      [data-composition-id="haus-photo"] .photo-corner.br { bottom: -10px; right: -10px; border-bottom-width: 1px; border-right-width: 1px; }
      [data-composition-id="haus-photo"] .photo-caption {
        font-family: 'Outfit', sans-serif;
        font-weight: 500;
        font-size: 28px;
        letter-spacing: 0.35em;
        color: #5D6E55;
        text-transform: uppercase;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Entrada do frame
        tl.from("#haus-photo-frame", { y: 60, opacity: 0, duration: 1.0, ease: "power3.out" }, 0.15);
        tl.from("#haus-photo-caption", { y: 18, opacity: 0, duration: 0.7, ease: "power2.out" }, 0.6);

        // Ken Burns lento na foto (5.5s de zoom suave)
        tl.fromTo("#haus-photo-img",
          { scale: 1.0 },
          { scale: 1.08, duration: 5.5, ease: "none" },
          0.4
        );

        window.__timelines["haus-photo"] = tl;
      })();
    </script>
  </div>
</template>
